{% extends "cine/base.html" %}

{% block content %}
<h2 class="mb-4">Funciones Ordenadas</h2>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Película</th>
            <th>Estado</th>
            <th>Fecha y Hora</th>
            <th>Precio</th>
        </tr>
    </thead>
    <tbody>
        {% for f in funciones %}
        <tr>
            <td>{{ f.pelicula.titulo }}</td>
            <td>{{ f.estado }}</td>
            <td>{{ f.fecha_hora }}</td>
            <td>{{ f.precio }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">No hay funciones registradas</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
